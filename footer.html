<footer class="relative w-full mt-auto z-10 bg-[#120F0F] border-t border-amber-900/30 text-white/80 py-12">
    <div class="max-w-7xl mx-auto px-8 grid grid-cols-1 md:grid-cols-3 gap-10 items-center">
        
        <div class="flex flex-col items-center md:items-start">
            <img src="logo.png" alt="Logo" class="h-16 mb-4 opacity-50 hover:opacity-100 transition-opacity duration-500">
            <h3 class="text-2xl font-serif italic text-amber-500 mb-1">Bhargavsinh Sisodiya</h3>
            <p class="text-white/40 tracking-[0.3em] uppercase text-[10px]">Heritage • Code • Legacy</p>
        </div>

        <div class="flex flex-col sm:flex-row justify-center items-center gap-6 text-[10px] uppercase tracking-[0.2em] text-white/60">
            <a href="disclaimer.html" class="hover:text-amber-500 transition-colors duration-300 cursor-pointer">Disclaimer</a>
            <a href="privacy-policy.html" class="hover:text-amber-500 transition-colors duration-300 cursor-pointer">Privacy Policy</a>
            <a href="grievance.html" class="hover:text-amber-500 transition-colors duration-300 cursor-pointer">Grievance</a>
        </div>

        <div class="flex justify-center md:justify-end">
            <div class="text-white/50 text-[10px] tracking-[0.2em] text-right bg-white/5 px-5 py-3 rounded-lg border border-white/10 shadow-inner">
                <p>© 2026 DIGITAL HEIR.</p>
                <p class="text-amber-500/80 mt-1">CRAFTED FOR THE SOVEREIGN.</p>
            </div>
        </div>
    </div>

    <div id="cookie-banner" class="fixed bottom-6 right-6 max-w-sm z-[1000] p-6 bg-[#1A1616]/95 backdrop-blur-xl border border-amber-600/20 rounded-2xl shadow-2xl transform translate-y-[120%] opacity-0 transition-all duration-700 ease-out">
        <div class="flex flex-col gap-4">
            <p class="text-white/80 text-xs font-sans leading-relaxed">
                We use cookies to elevate your browsing experience and ensure compliance with the <strong class="text-amber-500">DPDP Act, 2023</strong>.
            </p>
            <div class="flex justify-end gap-3 mt-2">
                <button id="decline-cookies" class="text-[10px] uppercase tracking-widest text-white/50 hover:text-white transition-colors px-4 py-2 cursor-pointer">Decline</button>
                <button id="accept-cookies" class="bg-amber-600 hover:bg-amber-500 text-black px-6 py-2 rounded-lg font-bold text-[10px] uppercase tracking-widest cursor-pointer shadow-[0_0_15px_rgba(217,119,6,0.3)] transition-all">Accept</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const banner = document.getElementById("cookie-banner");
            const acceptBtn = document.getElementById("accept-cookies");
            const declineBtn = document.getElementById("decline-cookies");

            // Check if user has already made a choice
            if (!localStorage.getItem("cookiesHandled")) {
                // Show banner after 1.5 seconds
                setTimeout(() => {
                    banner.classList.remove("translate-y-[120%]", "opacity-0");
                }, 1500);
            }

            // Handle Accept
            acceptBtn.addEventListener("click", () => {
                localStorage.setItem("cookiesHandled", "accepted");
                banner.classList.add("translate-y-[120%]", "opacity-0");
            });

            // Handle Decline
            declineBtn.addEventListener("click", () => {
                localStorage.setItem("cookiesHandled", "declined");
                banner.classList.add("translate-y-[120%]", "opacity-0");
            });
        });
    </script>
</footer>
