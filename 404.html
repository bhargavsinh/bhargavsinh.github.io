<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Lost in History</title>
    <link rel="stylesheet" type="text/css" href="style.css"/>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#09000f] text-white flex items-center justify-center min-h-screen cursor-none">

    <div class="bg-grid"></div>
    
    <div class="text-center p-6 reveal">
        <h1 class="text-9xl md:text-[12rem] font-yatra text-divine-gold mb-6 drop-shadow-[0_0_20px_rgba(255,215,0,0.5)]">404</h1>
        <h2 class="font-playfair text-3xl md:text-5xl mb-6">Lost in the Archives</h2>
        <p class="text-white/60 mb-10 text-lg font-light">The page you are looking for has been moved or does not exist in our digital legacy.</p>
        
        <a href="index.html" class="inline-block border border-divine-gold/50 text-divine-gold px-10 py-4 rounded-full font-bold uppercase tracking-widest hover:bg-divine-gold hover:text-black transition-all duration-300">
            Return to Kingdom
        </a>
    </div>

    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => { if (e.keyCode == 123 || (e.ctrlKey && (e.keyCode == 85 || e.keyCode == 67))) return false; };
    </script>
</body>
</html>
