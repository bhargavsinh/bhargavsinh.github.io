<!DOCTYPE html>
<html lang="hi" class="overflow-x-hidden">
<head>
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>વંશાવલી | Bhargavsinh Sisodiya</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS ફાઇલ્સ લિંક -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="colors.css">
    <link rel="stylesheet" href="responsive.css">
</head>
<body class="bg-[#0d0a0a] text-amber-100 min-h-screen font-sans w-full max-w-full overflow-x-hidden">

    <!-- ૧. હેડર (script.js દ્વારા header.html માંથી) -->
    <div id="header-container" class="w-full"></div>

    <!-- ૨. મુખ્ય કન્ટેન્ટ એરિયા (Main Area) -->
    <main class="w-full max-w-6xl mx-auto px-3 sm:px-6 py-6 md:py-10 space-y-6 overflow-hidden">
        <br>
        <!-- Last Updated Date Badge -->
        <div class="flex justify-end">
            <span class="text-[11px] text-amber-300/90 bg-amber-950/80 border border-amber-800/50 px-3 py-1 rounded-full flex items-center gap-1.5 shadow-[0_0_10px_rgba(245,158,11,0.15)]">
                <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                Updated: Aug 2026
            </span>
        </div>

        <!-- PDF & Vanshavali Box Wrapper -->
        <div class="w-full bg-[#161212] border border-amber-900/50 rounded-2xl p-4 sm:p-6 shadow-[0_0_25px_rgba(245,158,11,0.08)] space-y-5">
            
            <!-- ટાઇટલ -->
            <h1 class="text-lg sm:text-2xl font-bold text-center text-amber-300 border-b border-amber-900/40 pb-4 tracking-wide leading-relaxed">
                सूर्यवंशावतंस रघुवंशी मैत्रक कुलीय गुहिलोत कुल (मेवाड़) शिशोद / सिसोदिया वंशीय नरेशों एवं उपशाखा का ऐतिहासिक वंश-वृक्ष
            </h1>

            <!-- Google Docs Preview Section (Only Preview Mode) -->
            <div class="relative w-full h-[75vh] sm:h-[82vh] md:h-[88vh] rounded-xl overflow-hidden border border-amber-900/40 bg-[#0d0a0a] shadow-inner" style="-webkit-overflow-scrolling: touch;">
                <iframe 
                    src="https://docs.google.com/document/d/13ZFaacYk-o3qp2HaAMX4tT5OduaZvh1Q7yQtGidANfU/preview" 
                    class="w-full h-full border-0 rounded-xl"
                    allow="autoplay"
                    loading="lazy">
                </iframe>
            </div>

        </div>

    </main>

    <!-- ૩. ફૂટર (script.js દ્વારા footer.html માંથી) -->
    <div id="footer-container" class="w-full"></div>

    <!-- જાવાસ્ક્રિપ્ટ ફાઇલ્સ -->
    <script src="script.js"></script>

</body>
</html>
